<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Map</title>

<link rel="stylesheet" href="/assets/css/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<style>
#map{width:100%;height:600px;}
.region{fill:rgba(255,255,0,.05);stroke:yellow;stroke-width:2;cursor:pointer;}
.region:hover{fill:rgba(255,255,0,.15);}
.land{fill:#ccc;}
</style>
</head>

<body>

<h2 style="padding:10px;">Pacific Map</h2>
<svg id="map" viewBox="0 0 1000 600"></svg>

<script>

const svg = d3.select("#map");

const projection = d3.geoNaturalEarth1()
  .rotate([160,0])
  .fitSize([1000,600], {type:"Sphere"});

const path = d3.geoPath(projection);

Promise.all([
  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"),
  d3.json("/assets/data/eez_us_pacific.geojson"),
  d3.json("/assets/data/eez_okinawa_kagoshima.geojson")
]).then(([world, us, ok]) => {

  const land = topojson.feature(world, world.objects.countries);

  svg.append("g")
    .selectAll("path")
    .data(land.features)
    .join("path")
    .attr("class","land")
    .attr("d",path);

  const eez = [...(us.features||[]), ...(ok.features||[])];

  svg.append("g")
    .selectAll("path")
    .data(eez)
    .join("path")
    .attr("class","region")
    .attr("d",path)
    .on("click",(e,d)=>{
      alert(d.properties?.name || "EEZ");
    });

});

</script>

</body>
</html>
